name: Publish Documentation

on:
  release:
    types: [released]
  workflow_dispatch:

jobs: 
  deploy-documentation: 
    name: Deploying Documentation
    runs-on: ubuntu-latest
    env:
      HOME_REPO: /home/repo

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
          python-version: "3.13"

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install the requirements
        run: |
          uv sync --frozen --group docs
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install ghp-import
        run: uv pip install --no-build ghp-import==2.1.0

      - name: Build multiversion HTML
        working-directory: docs
        run: make multiversion

      - name: Redirect root to latest release tag
        run: |
          latest_tag="${{ github.event.release.tag_name }}"
          if [ -z "$latest_tag" ]; then
            latest_tag="$(git tag --sort=-version:refname | head -n 1)"
          fi
          if [ -z "$latest_tag" ]; then
            echo "No tag found to redirect to" >&2
            exit 1
          fi
          latest_tag="${latest_tag%%.*}" # filter any post-release suffixes (e.g. 0.2.0.post1 -> 0.2.0)
          if [ ! -d "docs/_build/en/${latest_tag}" ]; then
            echo "Built docs for tag ${latest_tag} not found" >&2
            ls docs/_build/en
            exit 1
          fi
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/">' "$latest_tag" > docs/_build/en/index.html
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/">' "en/$latest_tag" > docs/_build/index.html
          mkdir -p docs/_build/main
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/">' "../en/main" > docs/_build/main/index.html
          mkdir -p docs/_build/0.1.8
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/">' "../en/0.1.8" > docs/_build/0.1.8/index.html

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          ghp-import -n -f -p docs/_build/
